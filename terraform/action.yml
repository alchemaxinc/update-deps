name: 'Update Terraform Dependencies'

description: 'Update Terraform dependencies'

inputs:
  token:
    required: false
    description: 'GitHub token'
    default: ${{ github.token }}

  base-branch:
    required: true
    description: 'Base branch for PR'
    default: 'main'

  branch-prefix:
    required: false
    description: 'Branch prefix'
    default: 'update-dependencies'

  pr-title:
    required: false
    description: 'Title for the pull request'
    default: 'Update Terraform Dependencies'

  commit-message:
    required: false
    description: 'The commit message for the update'
    default: 'Update Terraform dependencies'

  backend-config:
    required: false
    description: 'Backend configuration value to pass to `terraform init -backend-config=<backend-config>` if needed, otherwise ignore'

  var-file-path:
    required: true
    description: 'Location of Terraform variable file (should contain all sensitive values)'

  working-dir:
    required: true
    description: 'Working directory for Terraform'

  app-slug:
    required: false
    description: 'GitHub App slug for commit attribution (e.g., my-app). If provided, configures git as the app bot'
    default: ''

  auto-merge:
    required: false
    description: 'Whether a successful PR should be automatically merged'
    default: 'false'

  skip-if-pr-exists:
    required: false
    description: 'Skip creating a new PR if an open PR with the same title already exists on the base branch'
    default: 'false'

  dry-run:
    required: false
    description: 'Run without creating a PR (for testing purposes)'
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Checkout and setup
      if: inputs.dry-run != 'true'
      uses: alchemaxinc/composite-toolbox/checkout-and-setup@v1
      with:
        token: ${{ inputs.token }}
        app-slug: ${{ inputs.app-slug }}

    - name: Check for existing pull request
      id: check_existing_pr
      if: inputs.dry-run != 'true' && inputs.skip-if-pr-exists == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        PR_TITLE: ${{ inputs.pr-title }}
        BASE_BRANCH: ${{ inputs.base-branch }}
      run: |
        existing=$(gh pr list \
          --repo "$GITHUB_REPOSITORY" \
          --state open \
          --base "$BASE_BRANCH" \
          --limit 200 \
          --json title,number \
          --jq '[.[] | select(.title == env.PR_TITLE)] | .[0].number // empty')

        if [ -n "$existing" ]; then
          echo "::notice::Open PR #$existing with title \"$PR_TITLE\" already exists; skipping PR creation"
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Setup Terraform
      if: steps.check_existing_pr.outputs.exists != 'true'
      uses: hashicorp/setup-terraform@v4

    - name: Baseline initialization
      if: steps.check_existing_pr.outputs.exists != 'true'
      shell: bash
      working-directory: ${{ inputs.working-dir }}
      run: |
        if [ -n "${{ inputs.backend-config }}" ]; then
          terraform init -var-file=${{ inputs.var-file-path }} -backend-config="${{ inputs.backend-config }}"
        else
          terraform init -var-file=${{ inputs.var-file-path }}
        fi

    - name: Get current versions
      if: steps.check_existing_pr.outputs.exists != 'true'
      shell: bash
      working-directory: ${{ inputs.working-dir }}
      run: terraform version -json > /tmp/terraform_versions.json

    - name: Update Terraform dependencies
      if: steps.check_existing_pr.outputs.exists != 'true'
      shell: bash
      run: python ${{ github.action_path }}/scripts/update_provider_versions.py ${{ inputs.working-dir }} /tmp/terraform_versions.json

    - name: Terraform validate
      if: steps.check_existing_pr.outputs.exists != 'true'
      shell: bash
      working-directory: ${{ inputs.working-dir }}
      run: terraform validate

    - name: Terraform fmt
      if: steps.check_existing_pr.outputs.exists != 'true'
      shell: bash
      working-directory: ${{ inputs.working-dir }}
      run: terraform fmt -write

    - name: Check for changes
      id: check_changes
      if: inputs.dry-run != 'true' && steps.check_existing_pr.outputs.exists != 'true'
      uses: alchemaxinc/composite-toolbox/check-changes@v1

    - name: Create Pull Request
      id: open-pr
      if: inputs.dry-run != 'true' && steps.check_changes.outputs.has_changes == 'true' && steps.check_existing_pr.outputs.exists != 'true'
      uses: alchemaxinc/composite-toolbox/create-pr@v1
      with:
        token: ${{ inputs.token }}
        base-branch: ${{ inputs.base-branch }}
        branch-prefix: ${{ inputs.branch-prefix }}
        files: '.'
        commit-message: ${{ inputs.commit-message }}
        pr-title: ${{ inputs.pr-title }}
        pr-body: |
          # :arrows_counterclockwise: Terraform Dependencies Update

          This pull request automatically updates Terraform provider dependencies to their latest versions.

          ## :warning: Important Notes

          - :robot: This PR was **automatically generated**
          - :mag: Please **review all changes** carefully before merging
          - :test_tube: Ensure all tests pass and functionality works as expected
          - :books: Check for any breaking changes or release notes for updated providers

          ## :rocket: Next Steps

          1. Review the dependency changes above
          2. Run tests locally or wait for CI/CD to complete
          3. Merge when everything looks good!

          ---

          *Generated by the Terraform Dependencies Update action* :sparkles:

    - name: Auto-merge Pull Request
      if: inputs.dry-run != 'true' && inputs.auto-merge == 'true' && steps.open-pr.outcome == 'success' && steps.check_existing_pr.outputs.exists != 'true'
      uses: alchemaxinc/composite-toolbox/merge-pr@v1
      with:
        token: ${{ inputs.token }}
        pull-request-number: ${{ steps.open-pr.outputs.pr_number }}
