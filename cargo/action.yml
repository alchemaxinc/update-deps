name: 'Update Cargo Dependencies'

description: 'Update Rust toolchain version and Cargo dependencies'

inputs:
  token:
    required: false
    description: 'GitHub token'
    default: ${{ github.token }}

  base-branch:
    required: true
    description: 'Base branch for PR'
    default: 'main'

  branch-prefix:
    required: false
    description: 'Branch prefix'
    default: 'update-dependencies'

  pr-title:
    required: false
    description: 'Title for the pull request'
    default: 'Update Cargo Dependencies'

  commit-message:
    required: false
    description: 'The commit message for the update'
    default: 'Update Cargo dependencies'

  app-slug:
    required: false
    description: 'GitHub App slug for commit attribution (e.g., my-app). If provided, configures git as the app bot'
    default: ''

  auto-merge:
    required: false
    description: 'Whether a successful PR should be automatically merged'
    default: 'false'

  skip-if-pr-exists:
    required: false
    description: 'Skip creating a new PR if an open PR with the same title already exists on the base branch'
    default: 'false'

  update-toolchain:
    required: false
    description: 'Whether to update the Rust toolchain version'
    default: 'true'

  update-deps:
    required: false
    description: 'Whether to update Cargo dependencies'
    default: 'true'

  dry-run:
    required: false
    description: 'Run without creating a PR (for testing purposes)'
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Checkout and setup
      if: inputs.dry-run != 'true'
      uses: alchemaxinc/composite-toolbox/checkout-and-setup@v1
      with:
        token: ${{ inputs.token }}
        app-slug: ${{ inputs.app-slug }}

    - name: Check for existing pull request
      id: check_existing_pr
      if: inputs.dry-run != 'true' && inputs.skip-if-pr-exists == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        PR_TITLE: ${{ inputs.pr-title }}
        BASE_BRANCH: ${{ inputs.base-branch }}
      run: |
        existing=$(gh pr list \
          --repo "$GITHUB_REPOSITORY" \
          --state open \
          --base "$BASE_BRANCH" \
          --limit 200 \
          --json title,number \
          --jq '[.[] | select(.title == env.PR_TITLE)] | .[0].number // empty')

        if [ -n "$existing" ]; then
          echo "::notice::Open PR #$existing with title \"$PR_TITLE\" already exists; skipping PR creation"
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Read current Rust version
      if: steps.check_existing_pr.outputs.exists != 'true'
      id: current_version
      shell: bash
      run: |
        if [ ! -f rust-toolchain.toml ]; then
          echo "::error::rust-toolchain.toml not found. This file is required as the source of truth for the Rust version."
          exit 1
        fi
        version=$(grep '^channel' rust-toolchain.toml | sed 's/.*"\(.*\)".*/\1/')
        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "::notice::Current Rust toolchain version: $version"

        is_stable="false"
        if echo "$version" | grep -qE '^[0-9]+\.[0-9]+(\.[0-9]+)?$'; then
          is_stable="true"
        fi
        echo "is_stable=$is_stable" >> "$GITHUB_OUTPUT"

        if [ "$is_stable" = "false" ]; then
          echo "::warning::Rust channel '$version' is not a stable version. Toolchain update will be skipped."
        fi

    - name: Setup Rust toolchain
      if: steps.check_existing_pr.outputs.exists != 'true'
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ steps.current_version.outputs.version }}

    - name: Get latest stable Rust version
      id: latest_version
      if: inputs.update-toolchain == 'true' && steps.current_version.outputs.is_stable == 'true' && steps.check_existing_pr.outputs.exists != 'true'
      shell: bash
      run: |
        tag=$(gh api repos/rust-lang/rust/releases/latest --jq '.tag_name')
        echo "version=$tag" >> "$GITHUB_OUTPUT"
        echo "::notice::Latest stable Rust version: $tag"
      env:
        GH_TOKEN: ${{ inputs.token }}

    - name: Update toolchain version
      id: toolchain_update
      if: inputs.update-toolchain == 'true' && steps.current_version.outputs.is_stable == 'true' && steps.current_version.outputs.version != steps.latest_version.outputs.version && steps.check_existing_pr.outputs.exists != 'true'
      shell: bash
      run: |
        old="${{ steps.current_version.outputs.version }}"
        new="${{ steps.latest_version.outputs.version }}"
        sed -i "s/channel = \"$old\"/channel = \"$new\"/" rust-toolchain.toml
        echo "updated=true" >> "$GITHUB_OUTPUT"
        echo "::notice::Updated Rust toolchain from $old to $new"

    - name: Discover Cargo.toml files
      id: discover
      if: inputs.update-deps == 'true' && steps.check_existing_pr.outputs.exists != 'true'
      shell: bash
      run: |
        manifests=$(find . -name Cargo.toml -not -path '*/target/*' | sort)
        echo "manifests<<EOF" >> "$GITHUB_OUTPUT"
        echo "$manifests" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"
        echo "::notice::Discovered Cargo manifests: $(echo "$manifests" | tr '\n' ' ')"

    - name: Update Cargo.toml dependencies
      id: update_deps
      if: inputs.update-deps == 'true' && steps.check_existing_pr.outputs.exists != 'true'
      shell: bash
      run: |
        python3 "${{ github.action_path }}/scripts/update_cargo_deps.py" \
          $(echo '${{ steps.discover.outputs.manifests }}' | tr '\n' ' ')

    - name: Refresh Cargo.lock files
      if: inputs.update-deps == 'true' && steps.check_existing_pr.outputs.exists != 'true'
      shell: bash
      run: |
        while IFS= read -r manifest; do
          [ -z "$manifest" ] && continue
          cargo update --manifest-path "$manifest"
        done <<< "${{ steps.discover.outputs.manifests }}"

    - name: Collect modified files
      if: steps.check_existing_pr.outputs.exists != 'true'
      id: collect_files
      shell: bash
      run: |
        files="rust-toolchain.toml"

        if [ "${{ inputs.update-deps }}" = "true" ]; then
          while IFS= read -r manifest; do
            [ -z "$manifest" ] && continue
            dir=$(dirname "$manifest")
            files+=" $manifest"
            if [ -f "$dir/Cargo.lock" ]; then
              files+=" $dir/Cargo.lock"
            fi
          done <<< "${{ steps.discover.outputs.manifests }}"
        fi

        echo "files=$files" >> "$GITHUB_OUTPUT"

    - name: Build PR body
      if: steps.check_existing_pr.outputs.exists != 'true'
      id: build_pr_body
      shell: bash
      env:
        TOOLCHAIN_UPDATED: ${{ steps.toolchain_update.outputs.updated }}
        CURRENT_VERSION: ${{ steps.current_version.outputs.version }}
        LATEST_VERSION: ${{ steps.latest_version.outputs.version }}
        DEP_UPDATES: ${{ steps.update_deps.outputs.dep_updates }}
        PR_BODY_SCRIPT: ${{ github.action_path }}/../shared/build_update_pr_body.py
      run: |
        preface_file="$RUNNER_TEMP/cargo-pr-preface.md"
        updates_file="$RUNNER_TEMP/cargo-updates.tsv"
        : > "$preface_file"
        printf "%s\n" "$DEP_UPDATES" > "$updates_file"

        if [ "$TOOLCHAIN_UPDATED" = "true" ]; then
          {
            echo "## Rust Toolchain"
            echo
            echo "| | Version |"
            echo "| --- | --- |"
            echo "| **Previous** | \`$CURRENT_VERSION\` |"
            echo "| **Updated** | \`$LATEST_VERSION\` |"
          } > "$preface_file"
        fi

        python3 "$PR_BODY_SCRIPT" \
          --title "# Cargo Dependencies Update" \
          --columns "Crate,Old,New,Manifest" \
          --updates-file "$updates_file" \
          --preface-file "$preface_file" \
          --footer ":robot: *This PR was automatically generated by the Cargo Dependencies Update action*"

    - name: Check for changes
      id: check_changes
      if: inputs.dry-run != 'true' && steps.check_existing_pr.outputs.exists != 'true'
      uses: alchemaxinc/composite-toolbox/check-changes@v1
      with:
        files: ${{ steps.collect_files.outputs.files }}

    - name: Create Pull Request
      id: open-pr
      if: inputs.dry-run != 'true' && steps.check_changes.outputs.has_changes == 'true' && steps.check_existing_pr.outputs.exists != 'true'
      uses: alchemaxinc/composite-toolbox/create-pr@v1
      with:
        token: ${{ inputs.token }}
        base-branch: ${{ inputs.base-branch }}
        branch-prefix: ${{ inputs.branch-prefix }}
        files: ${{ steps.collect_files.outputs.files }}
        commit-message: ${{ inputs.commit-message }}
        pr-title: ${{ inputs.pr-title }}
        pr-body: ${{ steps.build_pr_body.outputs.pr_body }}

    - name: Auto-merge Pull Request
      if: inputs.dry-run != 'true' && inputs.auto-merge == 'true' && steps.open-pr.outcome == 'success' && steps.check_existing_pr.outputs.exists != 'true'
      uses: alchemaxinc/composite-toolbox/merge-pr@v1
      with:
        token: ${{ inputs.token }}
        pull-request-number: ${{ steps.open-pr.outputs.pr_number }}
