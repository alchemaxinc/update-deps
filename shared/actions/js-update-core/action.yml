name: 'JavaScript Dependency Update Core'

description: >-
  Shared pipeline for JavaScript package managers: detects, applies and installs
  dependency updates using npm-check-updates and builds a pull request body.
  npm-check-updates must already be installed and available on PATH.

inputs:
  package-manager:
    required: true
    description: 'Package manager command used to install dependencies (e.g. npm, pnpm)'

  lockfile:
    required: true
    description: 'Lockfile name for the package manager (e.g. package-lock.json, pnpm-lock.yaml)'

  label:
    required: true
    description: 'Display label used in the pull request title and footer (e.g. NPM, pnpm)'

  install-flags:
    required: false
    description: 'Additional flags passed to the install command (e.g. --no-frozen-lockfile)'
    default: ''

  excluded-packages:
    required: false
    description: 'Packages to exclude from updates, in a comma-separated list format'

  relock:
    required: false
    description: 'Whether the lockfile should be regenerated, even if no other updates are available'
    default: 'false'

outputs:
  has_updates:
    description: 'Whether package version updates were found'
    value: ${{ steps.check_updates.outputs.has_updates }}

  should_install:
    description: 'Whether dependencies were (re)installed'
    value: ${{ steps.check_updates.outputs.should_install }}

  pr_body:
    description: 'Generated pull request body describing the updates'
    value: ${{ steps.build_pr_body.outputs.pr_body }}

runs:
  using: 'composite'
  steps:
    - name: Check for available updates
      id: check_updates
      shell: bash
      env:
        EXCLUDED_PACKAGES: ${{ inputs.excluded-packages }}
        RELOCK: ${{ inputs.relock }}
        LOCKFILE: ${{ inputs.lockfile }}
      run: |
        export PATH=~/.npm-global/bin:$PATH
        ncu_output=$(ncu --reject "$EXCLUDED_PACKAGES" 2>/dev/null || true)
        update_lines=$(echo "$ncu_output" | grep -E '^\s*\S+\s+\S+\s+→\s+\S+' || true)

        if [ -z "$update_lines" ]; then
          echo "has_updates=false" >> "$GITHUB_OUTPUT"
          if [ "$RELOCK" = "true" ]; then
            echo "::notice::No package updates available; relocking $LOCKFILE"
            echo "should_install=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::No updates available, stopping"
            echo "should_install=false" >> "$GITHUB_OUTPUT"
          fi
          exit 0
        fi

        echo "has_updates=true" >> "$GITHUB_OUTPUT"
        echo "should_install=true" >> "$GITHUB_OUTPUT"
        {
          echo "update_lines<<ENDOFLINES"
          echo "$update_lines"
          echo "ENDOFLINES"
        } >> "$GITHUB_OUTPUT"

    - name: Apply updates to package.json
      if: steps.check_updates.outputs.has_updates == 'true'
      shell: bash
      env:
        EXCLUDED_PACKAGES: ${{ inputs.excluded-packages }}
      run: |
        export PATH=~/.npm-global/bin:$PATH
        ncu -u --reject "$EXCLUDED_PACKAGES"

    - name: Collect update records
      id: collect_updates
      if: steps.check_updates.outputs.has_updates == 'true'
      shell: bash
      env:
        UPDATE_LINES: ${{ steps.check_updates.outputs.update_lines }}
      run: |
        updates=""

        while IFS= read -r line; do
          [ -z "$line" ] && continue
          pkg=$(echo "$line" | awk '{print $1}')
          old_ver=$(echo "$line" | awk '{print $2}')
          new_ver=$(echo "$line" | awk '{print $4}')
          [ -z "$pkg" ] && continue
          [ -z "$old_ver" ] && continue
          [ -z "$new_ver" ] && continue

          echo "::notice::Updated $pkg from $old_ver to $new_ver"
          updates+="${pkg}"$'\t'"${old_ver}"$'\t'"${new_ver}"$'\n'
        done <<< "$UPDATE_LINES"

        {
          echo "updates<<ENDOFUPDATES"
          printf "%s" "$updates"
          echo "ENDOFUPDATES"
        } >> "$GITHUB_OUTPUT"

    - name: Build PR description
      id: build_pr_body
      if: steps.check_updates.outputs.should_install == 'true'
      shell: bash
      env:
        HAS_UPDATES: ${{ steps.check_updates.outputs.has_updates }}
        UPDATES: ${{ steps.collect_updates.outputs.updates }}
        LABEL: ${{ inputs.label }}
        LOCKFILE: ${{ inputs.lockfile }}
        PR_BODY_SCRIPT: ${{ github.action_path }}/../../build_update_pr_body.py
      run: |
        updates_file="$RUNNER_TEMP/js-updates.tsv"
        printf "%s\n" "$UPDATES" > "$updates_file"
        empty_message=""
        if [ "$HAS_UPDATES" != "true" ]; then
          empty_message="Regenerated \`$LOCKFILE\` without package version changes."
        fi

        python3 "$PR_BODY_SCRIPT" \
          --title "# $LABEL Dependencies Update" \
          --columns "Package,Old,New" \
          --updates-file "$updates_file" \
          --empty-message "$empty_message" \
          --footer ":robot: *This PR was automatically generated by the $LABEL Dependencies Update action*"

    - name: Install updated dependencies
      if: steps.check_updates.outputs.should_install == 'true'
      shell: bash
      env:
        RELOCK: ${{ inputs.relock }}
        PACKAGE_MANAGER: ${{ inputs.package-manager }}
        LOCKFILE: ${{ inputs.lockfile }}
        INSTALL_FLAGS: ${{ inputs.install-flags }}
      run: |
        if [ "$RELOCK" = "true" ]; then
          rm -f "$LOCKFILE"
        fi
        $PACKAGE_MANAGER install $INSTALL_FLAGS
