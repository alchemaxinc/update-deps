name: 'Update Go Dependencies'

description: 'Update Go module dependencies'

inputs:
  token:
    required: false
    description: 'GitHub token'
    default: ${{ github.token }}

  base-branch:
    required: true
    description: 'Base branch for PR'
    default: 'main'

  branch-prefix:
    required: false
    description: 'Branch prefix'
    default: 'update-dependencies'

  pr-title:
    required: false
    description: 'Title for the pull request'
    default: 'Update Golang Dependencies'

  commit-message:
    required: false
    description: 'The commit message for the update'
    default: 'Update Golang dependencies'

  app-slug:
    required: false
    description: 'GitHub App slug for commit attribution (e.g., my-app). If provided, configures git as the app bot'
    default: ''

  auto-merge:
    required: false
    description: 'Whether a successful PR should be automatically merged'
    default: 'false'

  skip-if-pr-exists:
    required: false
    description: 'Skip creating a new PR if an open PR with the same title already exists on the base branch'
    default: 'false'

  strategy:
    required: false
    description: 'Strategy for updating dependencies (controlled, direct, or everything)'
    default: 'controlled'

  dry-run:
    required: false
    description: 'Run without creating a PR (for testing purposes)'
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Checkout and setup
      if: inputs.dry-run != 'true'
      uses: alchemaxinc/composite-toolbox/checkout-and-setup@v1
      with:
        token: ${{ inputs.token }}
        app-slug: ${{ inputs.app-slug }}

    - name: Check for existing pull request
      id: check_existing_pr
      if: inputs.dry-run != 'true' && inputs.skip-if-pr-exists == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        PR_TITLE: ${{ inputs.pr-title }}
        BASE_BRANCH: ${{ inputs.base-branch }}
      run: |
        existing=$(gh pr list \
          --repo "$GITHUB_REPOSITORY" \
          --state open \
          --base "$BASE_BRANCH" \
          --limit 200 \
          --json title,number \
          --jq '[.[] | select(.title == env.PR_TITLE)] | .[0].number // empty')

        if [ -n "$existing" ]; then
          echo "::notice::Open PR #$existing with title \"$PR_TITLE\" already exists; skipping PR creation"
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Setup Go
      if: steps.check_existing_pr.outputs.exists != 'true'
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
        cache: true
        cache-dependency-path: '**/go.sum'

    - name: Validate update strategy
      if: steps.check_existing_pr.outputs.exists != 'true'
      shell: bash
      env:
        STRATEGY: ${{ inputs.strategy }}
      run: |
        case "$STRATEGY" in
          controlled|direct|everything)
            ;;
          *)
            echo "::error::Invalid strategy '$STRATEGY'. Expected one of: controlled, direct, everything."
            exit 1
            ;;
        esac

    - name: Capture current dependencies
      if: steps.check_existing_pr.outputs.exists != 'true'
      shell: bash
      env:
        STRATEGY: ${{ inputs.strategy }}
      run: |
        if [ "$STRATEGY" = "direct" ]; then
          go list -m -f '{{if not .Indirect}}{{.Path}}@{{.Version}}{{end}}' all | sort > "$RUNNER_TEMP/go-before.txt"
        else
          go list -m -f '{{.Path}}@{{.Version}}' all | sort > "$RUNNER_TEMP/go-before.txt"
        fi

    - name: Update dependencies (controlled)
      if: inputs.strategy == 'controlled' && steps.check_existing_pr.outputs.exists != 'true'
      shell: bash
      run: |
        go get -t -u ./...
        go mod tidy

    - name: Update dependencies (direct)
      if: inputs.strategy == 'direct' && steps.check_existing_pr.outputs.exists != 'true'
      shell: bash
      run: |
        while IFS= read -r module; do
          [ -z "$module" ] && continue
          go get -u "$module"
        done < <(go list -m -f '{{if and (not .Indirect) (not .Main)}}{{.Path}}{{end}}' all)
        go mod tidy

    - name: Update dependencies (everything)
      if: inputs.strategy == 'everything' && steps.check_existing_pr.outputs.exists != 'true'
      shell: bash
      run: |
        while IFS= read -r module; do
          [ -z "$module" ] && continue
          go get "$module"
        done < <(go list -m -u all \
          | awk '$NF ~ /^\[v/ { print $1 "@" substr($NF, 2, length($NF) - 2) }')
        go mod tidy

    - name: Collect update records
      id: collect_updates
      if: steps.check_existing_pr.outputs.exists != 'true'
      shell: bash
      env:
        STRATEGY: ${{ inputs.strategy }}
      run: |
        if [ "$STRATEGY" = "direct" ]; then
          after=$(go list -m -f '{{if not .Indirect}}{{.Path}}@{{.Version}}{{end}}' all | sort)
        else
          after=$(go list -m -f '{{.Path}}@{{.Version}}' all | sort)
        fi

        before=$(cat "$RUNNER_TEMP/go-before.txt")
        updates=""
        while IFS= read -r line; do
          [ -z "$line" ] && continue
          pkg=$(echo "$line" | cut -d'@' -f1)
          old_ver=$(printf "%s\n" "$before" | awk -F@ -v pkg="$pkg" '$1 == pkg { print $2; exit }')
          new_ver=$(echo "$line" | cut -d'@' -f2)
          if [ -n "$old_ver" ] && [ "$old_ver" != "$new_ver" ]; then
            echo "::notice::Updated $pkg from $old_ver to $new_ver"
            updates+="${pkg}"$'\t'"${old_ver}"$'\t'"${new_ver}"$'\n'
          fi
        done <<< "$after"

        {
          echo "updates<<ENDOFUPDATES"
          printf "%s" "$updates"
          echo "ENDOFUPDATES"
        } >> "$GITHUB_OUTPUT"

    - name: Build PR description
      id: build_pr_body
      if: steps.check_existing_pr.outputs.exists != 'true'
      shell: bash
      env:
        UPDATES: ${{ steps.collect_updates.outputs.updates }}
        STRATEGY: ${{ inputs.strategy }}
        PR_BODY_SCRIPT: ${{ github.action_path }}/../shared/build_update_pr_body.py
      run: |
        updates_file="$RUNNER_TEMP/go-updates.tsv"
        preface_file="$RUNNER_TEMP/go-pr-preface.md"
        printf "%s\n" "$UPDATES" > "$updates_file"
        echo "**Strategy Used:** \`$STRATEGY\`" > "$preface_file"

        python3 "$PR_BODY_SCRIPT" \
          --title "# Go Module Dependencies Update" \
          --columns "Module,Old,New" \
          --updates-file "$updates_file" \
          --preface-file "$preface_file" \
          --footer ":robot: *This PR was automatically generated by the Go Dependencies Update action*"

    - name: Check for changes
      id: check_changes
      if: inputs.dry-run != 'true' && steps.check_existing_pr.outputs.exists != 'true'
      uses: alchemaxinc/composite-toolbox/check-changes@v1
      with:
        files: 'go.mod go.sum'

    - name: Create Pull Request
      id: open-pr
      if: inputs.dry-run != 'true' && steps.check_changes.outputs.has_changes == 'true' && steps.check_existing_pr.outputs.exists != 'true'
      uses: alchemaxinc/composite-toolbox/create-pr@v1
      with:
        token: ${{ inputs.token }}
        base-branch: ${{ inputs.base-branch }}
        branch-prefix: ${{ inputs.branch-prefix }}
        files: 'go.mod go.sum'
        commit-message: ${{ inputs.commit-message }}
        pr-title: ${{ inputs.pr-title }}
        pr-body: ${{ steps.build_pr_body.outputs.pr_body }}

    - name: Auto-merge Pull Request
      if: inputs.dry-run != 'true' && inputs.auto-merge == 'true' && steps.open-pr.outcome == 'success' && steps.check_existing_pr.outputs.exists != 'true'
      uses: alchemaxinc/composite-toolbox/merge-pr@v1
      with:
        token: ${{ inputs.token }}
        pull-request-number: ${{ steps.open-pr.outputs.pr_number }}
