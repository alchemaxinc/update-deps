name: 'Update NPM Dependencies'

description: 'Update NPM dependencies using npm-check-updates'

inputs:
  token:
    required: false
    description: 'GitHub token'
    default: ${{ github.token }}

  base-branch:
    required: true
    description: 'Base branch for PR'
    default: 'main'

  branch-prefix:
    required: false
    description: 'Branch prefix'
    default: 'update-dependencies'

  pr-title:
    required: false
    description: 'Title for the pull request'
    default: 'Update NPM Dependencies'

  commit-message:
    required: false
    description: 'The commit message for the update'
    default: 'Update NPM dependencies'

  excluded-packages:
    required: false
    description: 'Packages to exclude from updates, in a comma-separated list format'

  relock:
    required: false
    description: 'Whether package-lock.json should be regenerated, even if no other updates are available'
    default: 'false'

  app-slug:
    required: false
    description: 'GitHub App slug for commit attribution (e.g., my-app). If provided, configures git as the app bot'
    default: ''

  auto-merge:
    required: false
    description: 'Whether a successful PR should be automatically merged'
    default: 'false'

  dry-run:
    required: false
    description: 'Run without creating a PR (for testing purposes)'
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Checkout and setup
      if: inputs.dry-run != 'true'
      uses: alchemaxinc/composite-toolbox/checkout-and-setup@v1
      with:
        token: ${{ inputs.token }}
        app-slug: ${{ inputs.app-slug }}

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        cache: 'npm'
        node-version-file: '.nvmrc'

    - name: Cache npm-check-updates
      id: cache-ncu
      uses: actions/cache@v5
      with:
        path: ~/.npm-global
        key: npm-ncu-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          npm-ncu-${{ runner.os }}-

    - name: Install npm-check-updates
      if: steps.cache-ncu.outputs.cache-hit != 'true'
      shell: bash
      run: |
        npm config set prefix '~/.npm-global'
        export PATH=~/.npm-global/bin:$PATH
        npm install -g npm-check-updates

    - name: Check for available updates
      id: check_updates
      shell: bash
      run: |
        export PATH=~/.npm-global/bin:$PATH
        ncu_output=$(ncu --reject "${{ inputs.excluded-packages }}" 2>/dev/null || true)
        update_lines=$(echo "$ncu_output" | grep -E '^\s*\S+\s+\S+\s+→\s+\S+' || true)

        if [ -z "$update_lines" ]; then
          echo "::notice::No updates available, stopping"
          echo "has_updates=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "has_updates=true" >> "$GITHUB_OUTPUT"
        {
          echo "update_lines<<ENDOFLINES"
          echo "$update_lines"
          echo "ENDOFLINES"
        } >> "$GITHUB_OUTPUT"

    - name: Apply updates to package.json
      if: steps.check_updates.outputs.has_updates == 'true'
      shell: bash
      run: |
        export PATH=~/.npm-global/bin:$PATH
        ncu -u --reject "${{ inputs.excluded-packages }}"

    - name: Categorize updates by semver change
      id: categorize
      if: steps.check_updates.outputs.has_updates == 'true'
      shell: bash
      env:
        UPDATE_LINES: ${{ steps.check_updates.outputs.update_lines }}
      run: |
        major_updates=""
        minor_updates=""
        patch_updates=""

        while IFS= read -r line; do
          [ -z "$line" ] && continue
          pkg=$(echo "$line" | awk '{print $1}')
          old_ver=$(echo "$line" | awk '{print $2}')
          new_ver=$(echo "$line" | awk '{print $4}')
          [ -z "$pkg" ] && continue
          [ -z "$old_ver" ] && continue
          [ -z "$new_ver" ] && continue

          echo "::notice::Updated $pkg from $old_ver to $new_ver"

          clean_old=$(echo "$old_ver" | sed 's/^[^0-9]*//')
          clean_new=$(echo "$new_ver" | sed 's/^[^0-9]*//')
          old_major=$(echo "$clean_old" | cut -d. -f1 | cut -d- -f1)
          new_major=$(echo "$clean_new" | cut -d. -f1 | cut -d- -f1)
          old_minor=$(echo "$clean_old" | cut -d. -f2 | cut -d- -f1)
          new_minor=$(echo "$clean_new" | cut -d. -f2 | cut -d- -f1)

          entry="| \`$pkg\` | \`$old_ver\` | \`$new_ver\` |"

          if [ "$new_major" -gt "$old_major" ] 2>/dev/null; then
            major_updates+="${entry}"$'\n'
          elif [ "$new_major" -eq "$old_major" ] 2>/dev/null && [ "$new_minor" -gt "$old_minor" ] 2>/dev/null; then
            minor_updates+="${entry}"$'\n'
          else
            patch_updates+="${entry}"$'\n'
          fi
        done <<< "$UPDATE_LINES"

        for category in major minor patch; do
          var="${category}_updates"
          {
            echo "${category}<<ENDOF${category^^}"
            printf "%s" "${!var}"
            echo "ENDOF${category^^}"
          } >> "$GITHUB_OUTPUT"
        done

    - name: Build PR description
      id: build_pr_body
      if: steps.check_updates.outputs.has_updates == 'true'
      shell: bash
      env:
        MAJOR_UPDATES: ${{ steps.categorize.outputs.major }}
        MINOR_UPDATES: ${{ steps.categorize.outputs.minor }}
        PATCH_UPDATES: ${{ steps.categorize.outputs.patch }}
      run: |
        pr_body="# :arrows_counterclockwise: NPM Dependencies Update"
        pr_body+=$'\n'

        if [ -n "$MAJOR_UPDATES" ]; then
          pr_body+=$'\n'"## :boom: Major Updates (Breaking Changes)"
          pr_body+=$'\n'
          pr_body+=$'\n'"> :warning: **These updates may contain breaking changes. Please review carefully!**"
          pr_body+=$'\n'
          pr_body+=$'\n'"| Package | Old | New |"
          pr_body+=$'\n'"| --- | --- | --- |"
          pr_body+=$'\n'"$MAJOR_UPDATES"
        fi

        if [ -n "$MINOR_UPDATES" ]; then
          pr_body+=$'\n'"## :sparkles: Minor Updates"
          pr_body+=$'\n'
          pr_body+=$'\n'"| Package | Old | New |"
          pr_body+=$'\n'"| --- | --- | --- |"
          pr_body+=$'\n'"$MINOR_UPDATES"
        fi

        if [ -n "$PATCH_UPDATES" ]; then
          pr_body+=$'\n'"## :wrench: Patch Updates"
          pr_body+=$'\n'
          pr_body+=$'\n'"| Package | Old | New |"
          pr_body+=$'\n'"| --- | --- | --- |"
          pr_body+=$'\n'"$PATCH_UPDATES"
        fi

        pr_body+=$'\n'
        pr_body+=$'\n'"---"
        pr_body+=$'\n'
        pr_body+=$'\n'":robot: *This PR was automatically generated by the NPM Dependencies Update action*"

        {
          echo "pr_body<<ENDOFBODY"
          echo "$pr_body"
          echo "ENDOFBODY"
        } >> "$GITHUB_OUTPUT"

    - name: Install updated dependencies
      if: steps.check_updates.outputs.has_updates == 'true'
      shell: bash
      run: |
        if [ "${{ inputs.relock }}" = "true" ]; then
          rm -f package-lock.json
        fi
        npm install

    - name: Check for changes
      id: check_changes
      if: inputs.dry-run != 'true'
      uses: alchemaxinc/composite-toolbox/check-changes@v1
      with:
        files: 'package.json package-lock.json'

    - name: Create Pull Request
      id: open-pr
      if: inputs.dry-run != 'true' && steps.check_changes.outputs.has_changes == 'true'
      uses: alchemaxinc/composite-toolbox/create-pr@v1
      with:
        token: ${{ inputs.token }}
        base-branch: ${{ inputs.base-branch }}
        branch-prefix: ${{ inputs.branch-prefix }}
        files: 'package.json package-lock.json'
        commit-message: ${{ inputs.commit-message }}
        pr-title: ${{ inputs.pr-title }}
        pr-body: ${{ steps.build_pr_body.outputs.pr_body }}

    - name: Auto-merge Pull Request
      if: inputs.dry-run != 'true' && inputs.auto-merge == 'true' && steps.open-pr.outcome == 'success'
      uses: alchemaxinc/composite-toolbox/merge-pr@v1
      with:
        token: ${{ inputs.token }}
        pull-request-number: ${{ steps.open-pr.outputs.pr_number }}
