name: 'Update NPM Dependencies'

description: 'Update NPM dependencies using npm-check-updates'

inputs:
  token:
    required: false
    description: 'GitHub token'
    default: ${{ github.token }}

  base-branch:
    required: true
    description: 'Base branch for PR'
    default: 'main'

  branch-prefix:
    required: false
    description: 'Branch prefix'
    default: 'update-dependencies'

  pr-title:
    required: false
    description: 'Title for the pull request'
    default: 'Update NPM Dependencies'

  commit-message:
    required: false
    description: 'The commit message for the update'
    default: 'Update NPM dependencies'

  excluded-packages:
    required: false
    description: 'Packages to exclude from updates, in a comma-separated list format'

  relock:
    required: false
    description: 'Whether package-lock.json should be regenerated, even if no other updates are available'
    default: 'false'

  app-slug:
    required: false
    description: 'GitHub App slug for commit attribution (e.g., my-app). If provided, configures git as the app bot'
    default: ''

  auto-merge:
    required: false
    description: 'Whether a successful PR should be automatically merged'
    default: 'false'

  merge-method:
    required: false
    description: 'Merge method to use when auto-merging the PR. Must be one of: merge, squash, rebase. Used when auto-merge is enabled.'
    default: 'merge'

  skip-if-pr-exists:
    required: false
    description: 'Skip creating a new PR if an open PR with the same title already exists on the base branch'
    default: 'false'

  dry-run:
    required: false
    description: 'Run without creating a PR (for testing purposes)'
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Validate merge method
      uses: ./shared/actions/validate-merge-method
      with:
        merge-method: ${{ inputs.merge-method }}

    - name: Checkout and setup
      if: inputs.dry-run != 'true'
      uses: alchemaxinc/composite-toolbox/checkout-and-setup@v1
      with:
        token: ${{ inputs.token }}
        app-slug: ${{ inputs.app-slug }}

    - name: Check for existing pull request
      id: check_existing_pr
      if: inputs.dry-run != 'true' && inputs.skip-if-pr-exists == 'true'
      uses: ./shared/actions/check-existing-pr
      with:
        token: ${{ inputs.token }}
        pr-title: ${{ inputs.pr-title }}
        base-branch: ${{ inputs.base-branch }}

    - name: Setup Node.js
      if: steps.check_existing_pr.outputs.exists != 'true'
      uses: actions/setup-node@v7
      with:
        cache: 'npm'
        node-version-file: '.nvmrc'

    - name: Cache npm-check-updates
      if: steps.check_existing_pr.outputs.exists != 'true'
      id: cache-ncu
      uses: actions/cache@v6
      with:
        path: ~/.npm-global
        key: npm-ncu-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          npm-ncu-${{ runner.os }}-

    - name: Install npm-check-updates
      if: steps.cache-ncu.outputs.cache-hit != 'true' && steps.check_existing_pr.outputs.exists != 'true'
      shell: bash
      run: |
        npm config set prefix '~/.npm-global'
        export PATH=~/.npm-global/bin:$PATH
        npm install -g npm-check-updates

    - name: Update dependencies
      id: js_update
      if: steps.check_existing_pr.outputs.exists != 'true'
      uses: ./shared/actions/js-update-core
      with:
        package-manager: 'npm'
        lockfile: 'package-lock.json'
        label: 'NPM'
        excluded-packages: ${{ inputs.excluded-packages }}
        relock: ${{ inputs.relock }}

    - name: Check for changes
      id: check_changes
      if: inputs.dry-run != 'true' && steps.check_existing_pr.outputs.exists != 'true'
      uses: alchemaxinc/composite-toolbox/check-changes@v1
      with:
        files: 'package.json package-lock.json'

    - name: Create Pull Request
      id: open-pr
      if: inputs.dry-run != 'true' && steps.check_changes.outputs.has_changes == 'true' && steps.check_existing_pr.outputs.exists != 'true'
      uses: alchemaxinc/composite-toolbox/create-pr@v1
      with:
        token: ${{ inputs.token }}
        base-branch: ${{ inputs.base-branch }}
        branch-prefix: ${{ inputs.branch-prefix }}
        files: 'package.json package-lock.json'
        commit-message: ${{ inputs.commit-message }}
        pr-title: ${{ inputs.pr-title }}
        pr-body: ${{ steps.js_update.outputs.pr_body }}

    - name: Auto-merge Pull Request
      if: inputs.dry-run != 'true' && inputs.auto-merge == 'true' && steps.open-pr.outcome == 'success' && steps.check_existing_pr.outputs.exists != 'true'
      uses: alchemaxinc/composite-toolbox/merge-pr@v1
      with:
        token: ${{ inputs.token }}
        pull-request-number: ${{ steps.open-pr.outputs.pr_number }}
        merge-method: ${{ inputs.merge-method }}
