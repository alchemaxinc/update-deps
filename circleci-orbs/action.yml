name: 'Update CircleCI Orbs'

description: 'Update CircleCI orbs to their latest versions'

inputs:
  token:
    required: false
    description: 'GitHub token'
    default: ${{ github.token }}

  base-branch:
    required: true
    description: 'Base branch for PR'
    default: 'main'

  branch-prefix:
    required: false
    description: 'Branch prefix'
    default: 'update-orbs'

  pr-title:
    required: false
    description: 'Title for the pull request'
    default: 'Update CircleCI Orbs'

  commit-message:
    required: false
    description: 'The commit message for the update'
    default: 'Update CircleCI orbs'

  circleci-config-file:
    required: false
    description: 'Path to the CircleCI config file'
    default: '.circleci/config.yml'

  yq-version:
    required: false
    description: 'Version of yq to use'
    default: 'v4.44.1'

  app-slug:
    required: false
    description: 'GitHub App slug for commit attribution (e.g., my-app). If provided, configures git as the app bot'
    default: ''

  auto-merge:
    required: false
    description: 'Whether a successful PR should be automatically merged'
    default: 'false'

  skip-if-pr-exists:
    required: false
    description: 'Skip creating a new PR if an open PR with the same title already exists on the base branch'
    default: 'false'

  dry-run:
    required: false
    description: 'Run without creating a PR (for testing purposes)'
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Checkout and setup
      if: inputs.dry-run != 'true'
      uses: alchemaxinc/composite-toolbox/checkout-and-setup@v1
      with:
        token: ${{ inputs.token }}
        app-slug: ${{ inputs.app-slug }}

    - name: Check for existing pull request
      id: check_existing_pr
      if: inputs.dry-run != 'true' && inputs.skip-if-pr-exists == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        PR_TITLE: ${{ inputs.pr-title }}
        BASE_BRANCH: ${{ inputs.base-branch }}
      run: |
        existing=$(gh pr list \
          --repo "$GITHUB_REPOSITORY" \
          --state open \
          --base "$BASE_BRANCH" \
          --limit 200 \
          --json title,number \
          --jq '[.[] | select(.title == env.PR_TITLE)] | .[0].number // empty')

        if [ -n "$existing" ]; then
          echo "::notice::Open PR #$existing with title \"$PR_TITLE\" already exists; skipping PR creation"
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Cache yq binary
      if: steps.check_existing_pr.outputs.exists != 'true'
      id: cache-yq
      uses: actions/cache@v5
      with:
        path: ~/.local/bin/yq
        key: yq-${{ inputs.yq-version }}-linux-amd64

    - name: Install yq
      if: steps.cache-yq.outputs.cache-hit != 'true' && steps.check_existing_pr.outputs.exists != 'true'
      shell: bash
      run: |
        mkdir -p ~/.local/bin
        curl -L https://github.com/mikefarah/yq/releases/download/${{ inputs.yq-version }}/yq_linux_amd64 -o ~/.local/bin/yq
        chmod +x ~/.local/bin/yq

    - name: Add yq to PATH
      if: steps.check_existing_pr.outputs.exists != 'true'
      shell: bash
      run: echo "~/.local/bin" >> $GITHUB_PATH

    - name: Update CircleCI Orbs
      if: steps.check_existing_pr.outputs.exists != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        CONFIG_FILE: ${{ inputs.circleci-config-file }}
      run: |
        # Read orbs from config.yml
        orbs=$(yq eval '.orbs // {} | keys | .[]' "$CONFIG_FILE")

        for orb in $orbs; do
          echo "::debug::Processing orb: $orb"

          # Capture the old orb value (namespace@version)
          old_value=$(ORB="$orb" yq eval '.orbs[env(ORB)]' "$CONFIG_FILE")
          if [[ "$old_value" != *@* ]]; then
            echo "::warning::Skipping $orb because '$old_value' is not a versioned orb reference"
            continue
          fi

          # Get the orb namespace (e.g., "circleci/aws-cli" from "circleci/aws-cli@5.3.5")
          orb_full_name=$(echo "$old_value" | cut -d'@' -f1)
          orb_repo_name="${orb_full_name##*/}"

          # Get the current version
          current_version=$(echo "$old_value" | cut -d'@' -f2)

          # Get latest tag from GitHub
          latest_tag=$(gh api "repos/CircleCI-Public/${orb_repo_name}-orb/releases/latest" --jq '.tag_name' | sed 's/^v//')

          if [ -z "$latest_tag" ]; then
            echo "::error::Could not find latest tag for ${orb_repo_name}-orb, failing"
            exit 1
          fi

          echo "::debug::Latest version: $latest_tag"

          if [ "$current_version" != "$latest_tag" ]; then
            new_value="${orb_full_name}@${latest_tag}"
            ORB="$orb" NEW_VALUE="$new_value" yq eval -i '.orbs[env(ORB)] = env(NEW_VALUE)' "$CONFIG_FILE"
            echo "::notice::Updated $orb from $current_version to $latest_tag"
          else
            echo "::debug::$orb is already at latest version $latest_tag"
          fi
        done

    - name: Check for changes
      id: check_changes
      if: inputs.dry-run != 'true' && steps.check_existing_pr.outputs.exists != 'true'
      uses: alchemaxinc/composite-toolbox/check-changes@v1
      with:
        files: ${{ inputs.circleci-config-file }}

    - name: Create Pull Request
      id: open-pr
      if: inputs.dry-run != 'true' && steps.check_changes.outputs.has_changes == 'true' && steps.check_existing_pr.outputs.exists != 'true'
      uses: alchemaxinc/composite-toolbox/create-pr@v1
      with:
        token: ${{ inputs.token }}
        base-branch: ${{ inputs.base-branch }}
        branch-prefix: ${{ inputs.branch-prefix }}
        files: ${{ inputs.circleci-config-file }}
        commit-message: ${{ inputs.commit-message }}
        pr-title: ${{ inputs.pr-title }}
        pr-body: |
          # :arrows_counterclockwise: CircleCI Orbs Update

          This pull request automatically updates CircleCI orbs to their latest versions.

          ## :warning: Important Notes

          - :robot: This PR was **automatically generated**
          - :mag: Please **review all changes** carefully before merging
          - :test_tube: Ensure all tests pass and functionality works as expected
          - :books: Check for any breaking changes or release notes for updated orbs

          ## :rocket: Next Steps

          1. Review the orb changes above
          2. Run tests locally or wait for CI/CD to complete
          3. Merge when everything looks good!

          ---

          *Generated by the CircleCI Orbs Update action* :sparkles:

    - name: Auto-merge Pull Request
      if: inputs.dry-run != 'true' && inputs.auto-merge == 'true' && steps.open-pr.outcome == 'success' && steps.check_existing_pr.outputs.exists != 'true'
      uses: alchemaxinc/composite-toolbox/merge-pr@v1
      with:
        token: ${{ inputs.token }}
        pull-request-number: ${{ steps.open-pr.outputs.pr_number }}
