name: Update GitHub Actions
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0' # Run every Sunday at midnight

jobs:
  update-actions:
    runs-on: ubuntu-latest
    steps:
      - name: Create temporary GitHub App Token
        id: app
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.HOUSEKEEPING_BOT_APP_ID }}
          private-key: ${{ secrets.HOUSEKEEPING_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Update GitHub Actions (local workflow)
        uses: ./actions
        with:
          token: ${{ steps.app.outputs.token }}
          base-branch: 'main'
          branch-prefix: 'update-actions'
          pr-title: 'chore: Update GitHub Actions'
          commit-message: 'chore: update gitHub actions'
          file-glob: '.github/**/*.yml'
          auto-merge: 'true'

      - name: Update GitHub Actions  (files in top-level non-hidden folders)
        uses: ./actions
        with:
          token: ${{ steps.app.outputs.token }}
          base-branch: 'main'
          branch-prefix: 'update-actions'
          pr-title: 'feat: Update `action.yml` files'
          commit-message: 'feat: update `action.yml` files'
          file-glob: '[!.]*/action.yml'
          check-files: '[!.]*/action.yml'
          auto-merge: 'true'
