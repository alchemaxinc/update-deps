name: CI

on:
  push:
    branches-ignore:
      - main
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.14'
  CSPELL_VERSION: '8.0.0'
  BLACK_VERSION: '24.10.0'
  PRETTIER_VERSION: '3.3.3'
  COMMITLINT_CLI_VERSION: '20.2.0'

jobs:
  install-commitlint:
    runs-on: ubuntu-latest
    steps:
      - &checkout-code
        name: Checkout code
        uses: actions/checkout@v7

      - &cache-commitlint
        name: Cache Commitlint
        id: cache-commitlint
        uses: actions/cache@v6
        with:
          path: node_modules
          key: v4-commitlint-${{ env.COMMITLINT_CLI_VERSION }}

      - name: Install Commitlint
        if: steps.cache-commitlint.outputs.cache-hit != 'true'
        run: npm i -D @commitlint/cli@${{ env.COMMITLINT_CLI_VERSION }} @commitlint/config-conventional

  run-commitlint:
    runs-on: ubuntu-latest
    needs: install-commitlint
    steps:
      - name: Checkout code (full)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - *cache-commitlint

      - name: Run commitlint
        run: |
          git checkout main
          git checkout -
          ./node_modules/.bin/commitlint --from main --to HEAD --verbose

  install-prettier:
    runs-on: ubuntu-latest
    steps:
      - *checkout-code

      - &cache-prettier
        name: Cache Prettier
        id: cache-prettier
        uses: actions/cache@v6
        with:
          path: node_modules
          key: v1-prettier-${{ env.PRETTIER_VERSION }}

      - name: Install Prettier
        if: steps.cache-prettier.outputs.cache-hit != 'true'
        run: npm i -D prettier@${{ env.PRETTIER_VERSION }}

  run-prettier:
    runs-on: ubuntu-latest
    needs: install-prettier
    steps:
      - *checkout-code
      - *cache-prettier

      - name: Run Prettier check
        run: ./node_modules/.bin/prettier --check .

  run-black:
    runs-on: ubuntu-latest
    steps:
      - *checkout-code

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '${{ env.PYTHON_VERSION }}'

      - name: Cache Black
        uses: actions/cache@v6
        id: cache-black
        with:
          path: ~/.cache/pip
          key: v1-black-${{ env.BLACK_VERSION }}

      - name: Install Black
        run: pip install black==${{ env.BLACK_VERSION }}

      - name: Run Black check
        run: black --check .

  install-cspell:
    runs-on: ubuntu-latest
    steps:
      - *checkout-code

      - &cache-cspell
        name: Cache CSpell
        id: cache-cspell
        uses: actions/cache@v6
        with:
          path: node_modules
          key: v1-cspell-${{ env.CSPELL_VERSION }}

      - name: Install CSpell
        if: steps.cache-cspell.outputs.cache-hit != 'true'
        run: npm i -D cspell

  run-cspell:
    runs-on: ubuntu-latest
    needs: install-cspell
    steps:
      - *checkout-code
      - *cache-cspell

      - name: Run CSpell check
        run: ./node_modules/.bin/cspell

  python-unit-tests:
    name: Python Unit Tests (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: GitHub Actions
            directory: actions
            has-requirements: true
          - name: Terraform
            directory: terraform
            has-requirements: false
          - name: Cargo
            directory: cargo
            has-requirements: false
          - name: Docker
            directory: docker
            has-requirements: true
          - name: Shared Scripts
            directory: shared
            has-requirements: false
    steps:
      - *checkout-code

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        if: matrix.has-requirements
        working-directory: ${{ matrix.directory }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        working-directory: ${{ matrix.directory }}
        run: python -m unittest discover -s . -p "test_*.py" -v

  test-actions:
    name: Test GitHub Actions Updater
    runs-on: ubuntu-latest
    steps:
      - *checkout-code

      - name: Test actions updater
        uses: ./actions
        with:
          dry-run: 'true'
          file-glob: 'actions/test/.github/**/*.yml'

  test-circleci-orbs:
    name: Test CircleCI Orbs Updater
    runs-on: ubuntu-latest
    steps:
      - *checkout-code

      - name: Test CircleCI orbs updater
        uses: ./circleci-orbs
        with:
          dry-run: 'true'
          circleci-config-file: 'circleci-orbs/test/.circleci/config.yml'

  test-golang:
    name: Test Go Dependencies Updater
    runs-on: ubuntu-latest
    steps:
      - *checkout-code

      - name: Setup test fixtures
        run: |
          cp golang/test/go.mod .
          cp golang/test/go.sum .

      - name: Test Go dependencies updater
        uses: ./golang
        with:
          dry-run: 'true'

  test-npm:
    name: Test NPM Dependencies Updater
    runs-on: ubuntu-latest
    steps:
      - *checkout-code

      - name: Setup test fixtures
        run: |
          cp npm/test/package.json .
          cp npm/test/package-lock.json .
          cp npm/test/.nvmrc .

      - name: Test NPM dependencies updater
        uses: ./npm
        with:
          dry-run: 'true'

  test-pnpm:
    name: Test pnpm Dependencies Updater
    runs-on: ubuntu-latest
    steps:
      - *checkout-code

      - name: Setup test fixtures
        run: |
          cp pnpm/test/package.json .
          cp pnpm/test/pnpm-lock.yaml .
          cp pnpm/test/.nvmrc .

      - name: Test pnpm dependencies updater
        uses: ./pnpm
        with:
          dry-run: 'true'

  test-cargo:
    name: Test Cargo Dependencies Updater
    runs-on: ubuntu-latest
    steps:
      - *checkout-code

      - name: Setup test fixtures
        run: |
          cp cargo/test/rust-toolchain.toml .
          cp -r cargo/test/wrapper .

      - name: Test Cargo dependencies updater
        uses: ./cargo
        with:
          dry-run: 'true'

  test-terraform:
    name: Test Terraform Dependencies Updater
    runs-on: ubuntu-latest
    steps:
      - *checkout-code

      - name: Test Terraform dependencies updater
        uses: ./terraform
        with:
          dry-run: 'true'
          working-dir: 'terraform/test'
          var-file-path: 'test.tfvars'

  test-docker:
    name: Test Docker Images Updater
    runs-on: ubuntu-latest
    steps:
      - *checkout-code

      - name: Setup test fixtures
        run: |
          cp docker/test/Dockerfile .
          cp docker/test/docker-compose.yml .

      - name: Test Docker images updater
        uses: ./docker
        with:
          dry-run: 'true'

  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    if: always()
    needs:
      - run-commitlint
      - run-prettier
      - run-black
      - run-cspell
      - python-unit-tests
      - test-actions
      - test-circleci-orbs
      - test-golang
      - test-npm
      - test-pnpm
      - test-cargo
      - test-terraform
      - test-docker
    steps:
      - name: Verify all jobs passed or were skipped
        run: |
          results=(
            "${{ needs.run-commitlint.result }}"
            "${{ needs.run-prettier.result }}"
            "${{ needs.run-black.result }}"
            "${{ needs.run-cspell.result }}"
            "${{ needs.python-unit-tests.result }}"
            "${{ needs.test-actions.result }}"
            "${{ needs.test-circleci-orbs.result }}"
            "${{ needs.test-golang.result }}"
            "${{ needs.test-npm.result }}"
            "${{ needs.test-pnpm.result }}"
            "${{ needs.test-cargo.result }}"
            "${{ needs.test-terraform.result }}"
            "${{ needs.test-docker.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "Job failed or was cancelled: $result"
              exit 1
            fi
          done
          echo "All jobs passed or were skipped"
